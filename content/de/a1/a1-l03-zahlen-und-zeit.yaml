sections:
  # ------------------------------------------------------------------
  # SECCIÓN 1 — GRAMÁTICA: los números cardinales
  # ------------------------------------------------------------------
  - type: grammar
    slug: l03-grammar-numbers
    title:
      es: "Los números y cómo se construyen"
    explanation:
      es: >
        Los números del 0 al 12 hay que memorizarlos: null, eins, zwei, drei,
        vier, fünf, sechs, sieben, acht, neun, zehn, elf, zwölf. Del 13 al 19 es
        fácil: unidad + *zehn* (dreizehn, vierzehn, fünfzehn...). Las decenas
        acaban en *-zig*: zwanzig, vierzig, fünfzig, sechzig, siebzig, achtzig,
        neunzig. Tres irregulares que conviene fijar ya: *sechzehn* y *sechzig*
        pierden la -s de sechs; *siebzehn* y *siebzig* pierden el -en de sieben;
        y 30 es *dreißig*, con -ßig, no -zig. Lo más ajeno al español viene
        ahora: a partir de 21 se dice primero la unidad y luego la decena, unidas
        por *und*. Así, 21 = einundzwanzig ("uno-y-veinte"), 45 =
        fünfundvierzig, 99 = neunundneunzig. Ojo: en esa construcción, eins
        pierde la -s (einundzwanzig, no *einsundzwanzig*). Todo se escribe en una
        sola palabra, por larga que sea. 100 es hundert (o einhundert), 1000 es
        tausend. Dos usos inmediatos: la edad, con el verbo sein que ya conoces
        (*Ich bin dreißig Jahre alt*), y el teléfono, que en alemán se dice
        cifra a cifra, no en parejas como en español.
    examples:
      - de: "Ich bin fünfundzwanzig Jahre alt."
        es: "Tengo veinticinco años."
        note:
          es: "En alemán la edad se dice con sein (ser), no con haber/tener: literalmente 'soy 25 años viejo'."
      - de: "Wie alt bist du?"
        es: "¿Cuántos años tienes?"
      - de: "Meine Telefonnummer ist null vier vier, drei acht sieben."
        es: "Mi número de teléfono es 044 387."
        note:
          es: "Cifra a cifra. En Suiza los prefijos empiezan por 0 (Zürich = 044)."
      - de: "Die Wohnung kostet dreizehnhundert Franken."
        es: "El piso cuesta 1300 francos."
        note:
          es: "Entre 1100 y 1999 es habitual contar en centenas: dreizehnhundert = 13 x 100. Se usa mucho con precios y años."
      - de: "Ich wohne in der Bahnhofstraße einundzwanzig."
        es: "Vivo en la Bahnhofstraße 21."
    exercises:
