  # ------------------------------------------------------------------
  # SECCIÓN 2 — GRAMÁTICA: la hora y las preguntas de tiempo
  # ------------------------------------------------------------------
  - type: grammar
    slug: l03-grammar-time
    title:
      es: "¿Qué hora es? Decir la hora y preguntar por el tiempo"
    explanation:
      es: >
        Para preguntar la hora tienes dos fórmulas equivalentes: *Wie spät ist
        es?* y *Wie viel Uhr ist es?*. Se responde con *Es ist...*: Es ist drei
        Uhr (son las tres). Fíjate en que *Uhr* no cambia nunca y que el alemán
        usa el singular (*es ist*), no el plural del español ("son las"). El
        alemán tiene dos maneras de decir la hora. La **oficial** (24 horas) se
        usa en horarios de tren, aeropuertos, radio y citas formales: se dice la
        hora, luego *Uhr*, luego los minutos — *Es ist vierzehn Uhr dreißig*
        (14:30). Es la más fácil: solo necesitas los números de la sección
        anterior. La **coloquial** (12 horas) es la de la calle y usa cuatro
        piezas: *nach* (pasada la hora), *vor* (antes de la hora), *Viertel*
        (cuarto) y *halb* (media). Es ist zehn nach drei (3:10), es ist Viertel
        nach drei (3:15), es ist zehn vor vier (3:50), es ist Viertel vor vier
        (3:45). Y ahora lo importante, porque aquí se equivoca todo
        hispanohablante: **halb** no funciona como "y media". El alemán no mira
        la hora que deja atrás, sino la que viene: *halb drei* significa **2:30**
        ("media hora hacia las tres"), no las 3:30. Regla práctica: con *halb*,
        resta una hora respecto al español. Para situar acciones en el tiempo
        necesitas tres preposiciones: *um* + hora exacta (um acht Uhr, a las
        ocho), *am* + día (am Montag, el lunes), y *von... bis...* para un
        intervalo (von neun bis fünf, de nueve a cinco). Y dos W-Fragen nuevas
        que se suman a las de la lección anterior: *Wann?* (¿cuándo?) y *Um wie
        viel Uhr?* (¿a qué hora?), que siguen la estructura que ya conoces:
        palabra interrogativa + verbo + sujeto.
    examples:
      - de: "Wie spät ist es? — Es ist zwölf Uhr."
        es: "¿Qué hora es? — Son las doce."
      - de: "Es ist halb drei."
        es: "Son las dos y media."
        note:
          es: "¡Atención! halb drei = 2:30, NO 3:30. El alemán cuenta hacia la hora siguiente. Con halb, resta una hora respecto al español."
      - de: "Es ist Viertel nach acht."
        es: "Son las ocho y cuarto."
      - de: "Es ist Viertel vor neun."
        es: "Son las nueve menos cuarto."
      - de: "Der Zug nach Zürich fährt um sechs Uhr zweiundvierzig."
        es: "El tren a Zúrich sale a las 6:42."
        note:
          es: "Hora oficial: los horarios de tren en Suiza son famosos por su precisión al minuto. Aquí no se usa halb ni Viertel."
      - de: "Ich arbeite von neun bis fünf."
        es: "Trabajo de nueve a cinco."
      - de: "Wann beginnt der Deutschkurs? — Am Montag um achtzehn Uhr."
        es: "¿Cuándo empieza el curso de alemán? — El lunes a las 18:00."
    exercises:
      - slug: l03-time-ex01
        type: multiple_choice
        prompt: { es: "¿Qué hora es 'halb drei'?" }
        options: ["2:30", "3:00", "3:30", "2:00"]
        correctIndices: [0]
        skillTag: grammar:time
      - slug: l03-time-ex02
        type: multiple_choice
        prompt: { es: "Son las siete y media. ¿Cómo se dice en alemán?" }
        options: ["halb sieben", "halb acht", "sieben halb", "Viertel nach sieben"]
        correctIndices: [1]
        skillTag: grammar:time
      - slug: l03-time-ex03
        type: fill_blank
        prompt: { es: "Completa la pregunta: '¿Qué hora es?'" }
        text: "Wie ___ ist es?"
        blanks:
          - id: b1
            accept: ["spät", "spaet"]
        skillTag: grammar:time
      - slug: l03-time-ex04
        type: multiple_choice
        prompt: { es: "Es ist Viertel ___ neun. (8:45)" }
        options: ["nach", "vor", "halb", "um"]
        correctIndices: [1]
        skillTag: grammar:time
      - slug: l03-time-ex05
        type: fill_blank
        prompt: { es: "Completa: son las cinco y cuarto (5:15)." }
        text: "Es ist Viertel ___ fünf."
        blanks:
          - id: b1
            accept: ["nach"]
        skillTag: grammar:time
      - slug: l03-time-ex06
        type: matching
        prompt: { es: "Empareja cada expresión con su hora." }
        pairs:
          - { left: "halb zehn", right: { es: "9:30" } }
          - { left: "Viertel nach zehn", right: { es: "10:15" } }
          - { left: "Viertel vor zehn", right: { es: "9:45" } }
          - { left: "zehn Uhr", right: { es: "10:00" } }
        skillTag: grammar:time
      - slug: l03-time-ex07
        type: multiple_choice
        prompt: { es: "¿Qué preposición va con una hora exacta?" }
        options: ["am", "um", "von", "in"]
        correctIndices: [1]
        skillTag: grammar:time
      - slug: l03-time-ex08
        type: fill_blank
        prompt: { es: "Completa: 'Trabajo el lunes.'" }
