  # ------------------------------------------------------------------
  # SECCIÓN 4 — READING: el horario de Laura
  # ------------------------------------------------------------------
  - type: reading
    slug: l03-reading-stundenplan
    title:
      es: "La semana de Laura"
    text: |
      Hallo! Ich bin Laura. Ich komme aus Spanien, aber ich wohne jetzt in Zürich. Ich arbeite als Ingenieurin und ich lerne Deutsch. Meine Woche ist sehr voll!

      Von Montag bis Freitag arbeite ich von acht Uhr bis halb sechs. Das Büro ist in Zürich. Am Morgen bin ich immer pünktlich: der Zug kommt um sieben Uhr zweiundvierzig.

      Am Montag und am Mittwoch habe ich Deutschkurs. Der Kurs beginnt um achtzehn Uhr dreißig und dauert zwei Stunden. Er ist nicht einfach, aber sehr interessant.

      Am Freitag arbeite ich nur bis drei Uhr. Dann habe ich frei!

      Am Wochenende bin ich oft nicht in Zürich. Am Samstag bin ich in Luzern oder in Bern — der Zug nach Luzern dauert fünfzig Minuten. Am Sonntag arbeite ich nicht und ich lerne auch nicht. Ich habe Zeit für Kaffee.

      MEIN STUNDENPLAN
      Montag:     08:00–17:30 Büro / 18:30–20:30 Deutschkurs
      Dienstag:   08:00–17:30 Büro
      Mittwoch:   08:00–17:30 Büro / 18:30–20:30 Deutschkurs
      Donnerstag: 08:00–17:30 Büro
      Freitag:    08:00–15:00 Büro
      Samstag:    Luzern oder Bern
      Sonntag:    frei
    glossary:
      - { term: "der Stundenplan", translation: { es: "el horario (plan de horas)" } }
      - { term: "voll", translation: { es: "lleno/a" } }
      - { term: "das Büro", translation: { es: "la oficina" } }
      - { term: "der Deutschkurs", translation: { es: "el curso de alemán" } }
      - { term: "nur", translation: { es: "solo / solamente" } }
      - { term: "dann", translation: { es: "entonces / luego" } }
      - { term: "frei haben", translation: { es: "tener el día libre (ich habe frei = estoy libre)" } }
      - { term: "oft", translation: { es: "a menudo" } }
      - { term: "der Zug", translation: { es: "el tren" } }
      - { term: "für", translation: { es: "para" } }
      - { term: "er (= der Kurs)", translation: { es: "él / ello — en alemán se usa 'er' también para cosas de género masculino, como der Kurs" } }
      - { term: "Luzern", translation: { es: "Lucerna (ciudad suiza)" } }
    questions:
      - slug: l03-read-q01
        type: multiple_choice
        prompt: { es: "'Ich arbeite bis halb sechs.' ¿Qué hora es 'halb sechs' aquí?" }
