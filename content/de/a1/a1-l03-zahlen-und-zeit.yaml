    transcript: |
      (Ansage 1 — Bahnhof Zürich) Achtung! Der Zug nach Luzern fährt um vierzehn Uhr zweiundzwanzig, Gleis sieben. Der Zug nach Bern fährt um vierzehn Uhr fünfunddreißig, Gleis drei.

      (Nachricht 2 — Anrufbeantworter) Guten Tag, hier ist Sabine Meyer. Ich bin die Lehrerin. Der Deutschkurs beginnt am Dienstag, nicht am Montag! Er beginnt um achtzehn Uhr und dauert zwei Stunden. Meine Telefonnummer ist null acht neun, vier vier drei, zwei eins. Auf Wiederhören!

      (Dialog 3 — im Büro) — Entschuldigung, wie spät ist es?
      — Es ist halb zwölf.
      — Danke! Mein Termin ist um zwölf Uhr.

      (Nachricht 4 — Anrufbeantworter) Hallo Laura, hier ist Tom. Am Samstag bin ich in Zürich! Ich komme um elf Uhr. Hast du Zeit? Meine Nummer ist null sieben acht, sechs neun zwei. Bis Samstag!
