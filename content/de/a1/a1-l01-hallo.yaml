  # ------------------------------------------------------------------
  # SECCIÓN 1 — GRAMÁTICA: el verbo sein
  # ------------------------------------------------------------------
  - type: grammar
    slug: l01-grammar-sein
    title:
      es: 'El verbo sein y los pronombres personales'
    explanation:
      es: >
        En alemán, el verbo *sein* significa "ser" y "estar" (el alemán no los
        distingue como el español). Es el verbo más importante para empezar,
        porque lo usas para presentarte, decir de dónde eres y cómo estás. Es
        irregular, así que conviene memorizar sus formas desde el principio.
        Cada forma va con un pronombre personal (ich = yo, du = tú, er/sie/es =
        él/ella/ello, wir = nosotros, ihr = vosotros, sie/Sie = ellos/usted).
        Dos claves del alemán desde el minuto uno: (1) *du* es el "tú" informal
        y *Sie* (siempre en mayúscula) es el "usted" formal; elegir bien es
        cortesía. (2) En una afirmación el verbo va en segunda posición
        (*Ich bin Anna*), y en una pregunta de sí/no va primero (*Bist du Anna?*).
    examples:
      - de: 'Ich bin Anna.'
        es: 'Yo soy Anna.'
      - de: 'Du bist müde.'
        es: 'Tú estás cansado.'
      - de: 'Er ist aus Spanien.'
        es: 'Él es de España.'
      - de: 'Sind Sie Herr Müller?'
        es: '¿Es usted el señor Müller?'
        note:
          es: 'Pregunta formal: el verbo va primero.'
      - de: 'Wir sind Studenten.'
        es: 'Nosotros somos estudiantes.'
    exercises:
      - slug: l01-sein-ex01
        type: multiple_choice
        prompt:
          es: '¿Qué forma de sein va con ich?'
        options: ['bin', 'bist', 'ist', 'sind']
        correctIndices: [0]
        skillTag: grammar:sein
      - slug: l01-sein-ex02
