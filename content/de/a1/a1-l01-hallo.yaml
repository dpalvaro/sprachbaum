  # ------------------------------------------------------------------
  # SECCIÓN 3 — READING: un diálogo de presentación
  # ------------------------------------------------------------------
  - type: reading
    slug: l01-reading-gespraech
    title:
      es: 'Una conversación'
    text: |
      — Hallo! Ich bin Anna. Wie ist dein Name?
      — Guten Tag, Anna. Ich bin Tom.
      — Freut mich, Tom! Woher bist du?
      — Ich bin aus München. Und du?
      — Ich bin aus Madrid, aber ich wohne jetzt in Berlin.
      — Super! Bist du Studentin?
      — Ja, ich bin Studentin. Und du bist auch Student, oder?
      — Nein, ich bin Lehrer.
      — Ah, interessant! Tschüss, Tom, bis bald!
      — Tschüss, Anna!
    glossary:
      - {
          term: 'Freut mich',
          translation: { es: 'encantado/a (de conocerte)' },
        }
      - { term: 'woher', translation: { es: 'de dónde' } }
      - { term: 'aus', translation: { es: 'de (procedencia)' } }
      - { term: 'aber', translation: { es: 'pero' } }
      - { term: 'jetzt', translation: { es: 'ahora' } }
      - { term: 'auch', translation: { es: 'también' } }
      - { term: 'oder?', translation: { es: '¿verdad? / ¿no?' } }
      - { term: 'Studentin', translation: { es: 'estudiante (mujer)' } }
      - { term: 'Lehrer', translation: { es: 'profesor' } }
      - { term: 'bis bald', translation: { es: 'hasta pronto' } }
    questions:
      - slug: l01-read-q01
        type: multiple_choice
        prompt:
          es: '¿De dónde es Tom?'
        options: ['Madrid', 'München', 'Berlin']
        correctIndices: [1]
        skillTag: reading:l01
      - slug: l01-read-q02
