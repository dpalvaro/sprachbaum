  # ------------------------------------------------------------------
  # SECCIÓN 4 — READING: un perfil personal
  # ------------------------------------------------------------------
  - type: reading
    slug: l02-reading-profil
    title:
      es: "Un perfil personal"
    text: |
      Hallo! Ich heiße Laura und ich komme aus Spanien. Ich wohne jetzt in Zürich, in der Schweiz. Ich arbeite hier als Ingenieurin und ich lerne Deutsch.

      Ich spreche Spanisch, Englisch und ein bisschen Deutsch. Deutsch ist nicht einfach, aber sehr interessant!

      Meine Adresse ist Bahnhofstraße 12, Zürich. Und du? Woher kommst du? Wo wohnst du? Was sprichst du?
    glossary:
      - { term: "jetzt", translation: { es: "ahora" } }
      - { term: "hier", translation: { es: "aquí" } }
      - { term: "als", translation: { es: "como (en calidad de)" } }
      - { term: "Ingenieurin", translation: { es: "ingeniera" } }
      - { term: "ein bisschen", translation: { es: "un poco" } }
      - { term: "nicht", translation: { es: "no" } }
      - { term: "einfach", translation: { es: "fácil / sencillo" } }
      - { term: "sehr", translation: { es: "muy" } }
      - { term: "interessant", translation: { es: "interesante" } }
      - { term: "meine", translation: { es: "mi (posesivo)" } }
      - { term: "Bahnhofstraße", translation: { es: "calle de la estación (nombre de calle)" } }
    questions:
      - slug: l02-read-q01
        type: multiple_choice
        prompt: { es: "¿De dónde viene Laura?" }
        options: ["der Schweiz", "Spanien", "Deutschland"]
        correctIndices: [1]
        skillTag: reading:l02
      - slug: l02-read-q02
        type: multiple_choice
        prompt: { es: "¿Dónde vive ahora?" }
        options: ["Madrid", "Berlin", "Zürich"]
        correctIndices: [2]
        skillTag: reading:l02
      - slug: l02-read-q03
        type: multiple_choice
        prompt: { es: "¿Qué profesión tiene?" }
        options: ["Lehrerin", "Ingenieurin", "Studentin"]
        correctIndices: [1]
