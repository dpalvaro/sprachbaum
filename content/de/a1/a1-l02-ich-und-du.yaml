sections:
  # ------------------------------------------------------------------
  # SECCIÓN 1 — GRAMÁTICA: verbos regulares en presente
  # ------------------------------------------------------------------
  - type: grammar
    slug: l02-grammar-present-regular
    title:
      es: "Verbos regulares en presente"
    explanation:
      es: >
        En la lección anterior aprendiste *sein* (ser/estar), que es irregular.
        Ahora toca la mayoría de los verbos alemanes: los regulares, que siguen
        todos el mismo patrón fácil. Tomas la raíz del verbo (el infinitivo sin
        la terminación -en) y le añades una terminación según quién hace la
        acción. Por ejemplo, *wohnen* (vivir) → raíz *wohn-*: ich wohne, du
        wohnst, er/sie/es wohnt, wir wohnen, ihr wohnt, sie/Sie wohnen. Este
        patrón funciona con casi todos los verbos: kommen (venir), heißen
        (llamarse), lernen (aprender), arbeiten (trabajar). El verbo *sprechen*
        (hablar) cambia un poco la raíz (ich spreche, du sprichst) — lo verás
        en detalle más adelante, pero sus terminaciones son las mismas.
    examples:
      - de: "Ich wohne in Berlin."
        es: "Vivo en Berlín."
      - de: "Woher kommst du?"
        es: "¿De dónde vienes?"
      - de: "Sie heißt Anna."
        es: "Ella se llama Anna."
      - de: "Wir lernen Deutsch."
        es: "Aprendemos alemán."
      - de: "Er arbeitet in München."
        es: "Él trabaja en Múnich."
    exercises:
      - slug: l02-pres-ex01
        type: multiple_choice
        prompt: { es: "¿Qué terminación va con ich?" }
        options: ["-e", "-st", "-t", "-en"]
        correctIndices: [0]
        skillTag: grammar:present-regular
      - slug: l02-pres-ex02
        type: multiple_choice
        prompt: { es: "Du ___ in Hamburg. (wohnen)" }
        options: ["wohne", "wohnst", "wohnt", "wohnen"]
        correctIndices: [1]
        skillTag: grammar:present-regular
      - slug: l02-pres-ex03
