  # ------------------------------------------------------------------
  # SECCIÓN 2 — GRAMÁTICA: las W-Fragen
  # ------------------------------------------------------------------
  - type: grammar
    slug: l02-grammar-w-questions
    title:
      es: "Preguntar con las W-Fragen"
    explanation:
      es: >
        Ya sabes conjugar verbos. Ahora vas a hacer preguntas para pedir
        información personal. En alemán, muchas palabras interrogativas empiezan
        por W (por eso se llaman W-Fragen). Las principales: *wie* (cómo),
        *woher* (de dónde), *wo* (dónde), *was* (qué), *wer* (quién). La
        estructura es fácil de recordar: palabra-W + verbo + sujeto, con el
        verbo siempre en segunda posición. Por ejemplo: *Wo wohnst du?*
        (¿Dónde vives?). Cuidado con no confundir *wo* (dónde) con *woher*
        (de dónde): woher pregunta por el origen.
    examples:
      - de: "Wie heißt du?"
        es: "¿Cómo te llamas?"
      - de: "Woher kommst du?"
        es: "¿De dónde vienes?"
      - de: "Wo wohnst du?"
        es: "¿Dónde vives?"
      - de: "Was sprichst du?"
        es: "¿Qué (idioma) hablas?"
      - de: "Wer ist das?"
        es: "¿Quién es ese/esa?"
    exercises:
      - slug: l02-wq-ex01
        type: multiple_choice
        prompt: { es: "¿Qué palabra significa 'de dónde'?" }
        options: ["wie", "wo", "woher", "was"]
        correctIndices: [2]
        skillTag: grammar:w-questions
      - slug: l02-wq-ex02
        type: multiple_choice
        prompt: { es: "___ heißt du? (¿Cómo te llamas?)" }
        options: ["Wie", "Wo", "Woher", "Wer"]
        correctIndices: [0]
        skillTag: grammar:w-questions
      - slug: l02-wq-ex03
        type: fill_blank
        prompt: { es: "¿Dónde vives?" }
        text: "___ wohnst du?"
        blanks:
          - id: b1
            accept: ["Wo"]
        skillTag: grammar:w-questions
      - slug: l02-wq-ex04
        type: fill_blank
        prompt: { es: "¿De dónde vienes?" }
        text: "___ kommst du?"
        blanks:
          - id: b1
            accept: ["Woher"]
        skillTag: grammar:w-questions
      - slug: l02-wq-ex05
        type: multiple_choice
        prompt: { es: "___ ist das? (¿Quién es?)" }
        options: ["Wie", "Was", "Wer", "Wo"]
        correctIndices: [2]
        skillTag: grammar:w-questions
      - slug: l02-wq-ex06
        type: matching
        prompt: { es: "Empareja cada palabra interrogativa con su traducción." }
        pairs:
          - { left: "wie", right: { es: "cómo" } }
          - { left: "wo", right: { es: "dónde" } }
          - { left: "woher", right: { es: "de dónde" } }
          - { left: "was", right: { es: "qué" } }
        skillTag: grammar:w-questions
      - slug: l02-wq-ex07
        type: sentence_order
        prompt: { es: "Ordena la pregunta." }
        fragments: ["du", "wo", "wohnst"]
        correctOrder: [1, 2, 0]
        skillTag: grammar:w-questions
      - slug: l02-wq-ex08
        type: sentence_order
        prompt: { es: "Ordena la pregunta." }
        fragments: ["kommst", "woher", "du"]
        correctOrder: [1, 0, 2]
        skillTag: grammar:w-questions
      - slug: l02-wq-ex09
        type: fill_blank
        prompt: { es: "Completa con la W correcta. Respuesta: 'Ich spreche Spanisch.'" }
        text: "___ sprichst du?"
        blanks:
          - id: b1
            accept: ["Was"]
        skillTag: grammar:w-questions
      - slug: l02-wq-ex10
        type: multiple_choice
        prompt: { es: "En 'Wo wohnst du?', ¿en qué posición va el verbo?" }
        options: ["primera", "segunda", "tercera"]
        correctIndices: [1]
        skillTag: grammar:w-questions

