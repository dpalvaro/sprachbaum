services:
  postgres:
    image: postgres:16-alpine
    env_file: .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    env_file: .env
    environment:
      PORT: ${API_PORT}
      # Descomentar si el watch de archivos no se dispara con el bind mount:
      # CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${API_PORT}:${API_PORT}"
    volumes:
      - .:/app
      - api_root_modules:/app/node_modules
      - api_modules:/app/apps/api/node_modules
      - api_shared_modules:/app/packages/shared/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    env_file: .env
    environment:
      PORT: ${WEB_PORT}
      # Descomentar si el watch de archivos no se dispara con el bind mount:
      # WATCHPACK_POLLING: "true"
    ports:
      - "${WEB_PORT}:${WEB_PORT}"
    volumes:
      - .:/app
      - web_root_modules:/app/node_modules
      - web_modules:/app/apps/web/node_modules
      - web_shared_modules:/app/packages/shared/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
  api_root_modules:
  api_modules:
  api_shared_modules:
  web_root_modules:
  web_modules:
  web_shared_modules:
